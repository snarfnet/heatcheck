name: HeatCheck
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "15.0"

settings:
  base:
    SWIFT_VERSION: 5.9
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.HeatCheck
    CODE_SIGN_STYLE: Automatic
    GAD_APPLICATION_IDENTIFIER: "ca-app-pub-9404799280370656~6558437008"
    GAD_TOP_BANNER_AD_UNIT_ID: "ca-app-pub-9404799280370656/1830065956"
    GAD_BOTTOM_BANNER_AD_UNIT_ID: "ca-app-pub-9404799280370656/5245355333"

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 12.0.0

targets:
  HeatCheck:
    type: application
    platform: iOS
    sources:
      - path: HeatCheck
        excludes:
          - GeneratedSource/**
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
    settings:
      base:
        INFOPLIST_FILE: HeatCheck/Info.plist
        PRODUCT_NAME: HeatCheck
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: HeatCheck/Info.plist
      properties:
        CFBundleName: HeatCheck
        CFBundleDisplayName: 発熱スマホお知らせ
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        UIUserInterfaceStyle: Light
        GADApplicationIdentifier: "$(GAD_APPLICATION_IDENTIFIER)"
        GADTopBannerAdUnitID: "$(GAD_TOP_BANNER_AD_UNIT_ID)"
        GADBottomBannerAdUnitID: "$(GAD_BOTTOM_BANNER_AD_UNIT_ID)"
        SKAdNetworkItems:
