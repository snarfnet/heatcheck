name: iOS Upload

on:
  workflow_dispatch:

env:
  ASC_KEY_ID: WDXGY9WX55
  ASC_ISSUER_ID: 2be0734f-943a-4d61-9dc9-5d9045c46fec

jobs:
  upload:
    name: Archive and Upload HeatCheck
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          if [ -n "$XCODE_APP" ]; then
            sudo xcode-select -s "/Applications/$XCODE_APP"
          fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install Python dependencies
        run: pip3 install --break-system-packages PyJWT requests

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Set up ASC API Key
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
          ASC_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          DEST=~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          if [ -n "$ASC_API_KEY_CONTENT" ]; then
            if echo "$ASC_API_KEY_CONTENT" | grep -q "BEGIN PRIVATE KEY"; then
              printf '%s' "$ASC_API_KEY_CONTENT" > "$DEST"
            else
              echo "$ASC_API_KEY_CONTENT" | base64 -D > "$DEST"
            fi
          elif [ -n "$ASC_API_KEY_BASE64" ]; then
            echo "$ASC_API_KEY_BASE64" | base64 -d > "$DEST"
          else
            echo "::error::No API key secret found (need ASC_API_KEY_CONTENT or APP_STORE_CONNECT_API_KEY_BASE64)"
            exit 1
          fi
          chmod 600 "$DEST"
          echo "ASC_P8_PATH=$DEST" >> "$GITHUB_ENV"

      - name: Prepare signing keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

      - name: Create CI distribution certificate
        env:
          BUILD_KEYCHAIN: build.keychain
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: python3 scripts/create_distribution_certificate.py

      - name: Prepare App Store provisioning profile
        env:
          APP_BUNDLE_ID: com.tokyonasu.HeatCheck
          PROFILE_NAME: "HeatCheck App Store"
          REFRESH_PROFILE: "true"
        run: python3 scripts/prepare_app_store_profile.py

      - name: Archive
        run: |
          xcodebuild archive \
            -project HeatCheck.xcodeproj \
            -scheme HeatCheck \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/HeatCheck.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=83VGKGSQUH \
            PROVISIONING_PROFILE_SPECIFIER="HeatCheck App Store" \
            PRODUCT_BUNDLE_IDENTIFIER=com.tokyonasu.HeatCheck \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_P8_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>83VGKGSQUH</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.tokyonasu.HeatCheck</key>
              <string>HeatCheck App Store</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>destination</key>
            <string>export</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath build/HeatCheck.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath build/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_P8_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload to App Store Connect
        run: |
          IPA_PATH="$(find build/export -name "*.ipa" -print -quit)"
          test -n "$IPA_PATH"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Submit for Review
        env:
          APP_VERSION: "1.0"
        run: python3 scripts/submit_review.py ${{ github.run_number }}
